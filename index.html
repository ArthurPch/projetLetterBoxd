<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Cinéma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav class="nav">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-film"></i>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Films</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Populaires</a></li>
            </ul>
            <div class="menu-mobile">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content container">
                <div class="search-box">
                    <input type="text" placeholder="Rechercher un film..." id="search-input">
                    <button id="search-button"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </section>

        <section class="trending container">
            <div class="section-header">
                <h2>Tendances</h2>
                <div class="filters">
                    <button class="btn-filter active" data-filter="top_rated">Aujourd'hui</button>
                    <button class="btn-filter" data-filter="week">Cette semaine</button>
                </div>
            </div>
            <div id="trending-grid" class="movie-grid"></div>
        </section>

        <section class="tv-shows container">
            <div class="section-header">
                <h2>Séries TV</h2>
                <div class="filters">
                    <button class="btn-filter active" data-filter="top_rated">Mieux notées</button>
                    <button class="btn-filter" data-filter="popular">Populaires</button>
                </div>
            </div>
            <div id="tv-grid" class="movie-grid"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Junia CIR2 - Projet Cinéma</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
